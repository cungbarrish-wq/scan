<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DocScanner App</title>
    
    <!-- PWA & SEO Meta Tags -->
    <link rel="icon" type="image/jpeg" href="https://img.freepik.com/premium-vector/scan-documents-icon_268104-3391.jpg?w=360">
    <link rel="apple-touch-icon" href="https://img.freepik.com/premium-vector/scan-documents-icon_268104-3391.jpg?w=360">
    <link rel="manifest" href="manifest.json">
    
    <!-- Tailwind CSS សម្រាប់រៀបចំ UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jsPDF សម្រាប់បង្កើត PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- LocalForage សម្រាប់ផ្ទុករូបភាព -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ប្រើ 100dvh ដើម្បីការពារកុំឲ្យបាត់របារខាងលើ/ក្រោម លើ iOS Safari */
        body { height: 100dvh; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-open { transform: translateX(0); }
        .sidebar-closed { transform: translateX(-100%); }
        /* ការពារកុំឲ្យរមិលអេក្រង់ពេលកំពុងអូសកែងនៅលើទូរស័ព្ទ */
        #editorCanvas { touch-action: none; max-width: 100%; max-height: 60vh; } 
    </style>
</head>
<body class="bg-gray-100 flex flex-col overflow-hidden">

    <!-- Loading Screen សម្រាប់រង់ចាំ OpenCV ដំណើរការ -->
    <div id="loadingScreen" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center">
        <i class="fa-solid fa-spinner fa-spin text-4xl text-blue-600 mb-4"></i>
        <p class="text-gray-700 font-bold mt-2">កំពុងរៀបចំប្រព័ន្ធកាត់រូប...</p>
        <p class="text-sm text-gray-500">(សូមរង់ចាំបន្តិច)</p>
    </div>

    <!-- Navbar (ធានាថាមិនបាត់) -->
    <div class="bg-blue-600 text-white p-4 flex justify-between items-center shadow-md z-40 shrink-0 w-full">
        <button id="menuBtn" class="text-2xl focus:outline-none p-2">
            <i class="fa-solid fa-bars"></i>
        </button>
        <h1 class="text-xl font-bold">DocScanner</h1>
        <!-- ប៊ូតុងយករូបភាពថ្មី (អាចថត ឬយកពី Gallery) -->
        <label class="cursor-pointer bg-blue-700 hover:bg-blue-800 px-3 py-2 rounded-lg flex items-center gap-2 shadow transition">
            <i class="fa-solid fa-camera"></i> <span class="hidden sm:inline">/</span> <i class="fa-solid fa-image"></i>
            <input type="file" id="fileInput" accept="image/*" class="hidden">
        </label>
    </div>

    <!-- Sidebar (Hide Menu) -->
    <div id="sidebar" class="sidebar-closed fixed top-0 left-0 h-full w-64 bg-white shadow-2xl z-50 flex flex-col">
        <div class="bg-blue-600 text-white p-4 text-lg font-bold flex justify-between items-center">
            <span>ឯកសារដែលបាន Save</span>
            <button id="closeMenuBtn" class="p-2"><i class="fa-solid fa-times text-2xl"></i></button>
        </div>
        <div class="p-4 flex-1 overflow-y-auto" id="savedList">
            <!-- បញ្ជីរូបភាពដែលបាន Save -->
        </div>
        <div class="p-4 border-t shrink-0">
            <button id="exportPdfBtn" class="w-full bg-red-500 hover:bg-red-600 text-white py-3 rounded-lg shadow flex justify-center items-center gap-2 font-bold transition">
                <i class="fa-solid fa-file-pdf"></i> បង្កើតជា PDF
            </button>
        </div>
    </div>

    <!-- Main Workspace -->
    <div class="flex-1 p-4 flex flex-col items-center justify-start overflow-y-auto relative w-full">
        
        <div id="placeholder" class="text-gray-400 flex flex-col items-center justify-center h-full w-full">
            <i class="fa-solid fa-file-signature text-6xl mb-4"></i>
            <p class="text-center">សូមថតរូប<br>ឬជ្រើសរើសរូបភាពពី Gallery</p>
        </div>

        <div id="workspace" class="hidden w-full max-w-md flex flex-col items-center">
            
            <p id="instructionText" class="text-sm text-gray-600 mb-2 font-bold text-center">អូសចំណុចក្រហមឲ្យចំកែងឯកសារទាំង៤</p>
            
            <!-- Canvas សម្រាប់បង្ហាញរូប និងអូសកែង -->
            <div class="relative bg-black rounded shadow-lg flex justify-center items-center select-none touch-none mt-2">
                <canvas id="editorCanvas"></canvas>
                
                <!-- កែវពង្រីក (Loupe) សម្រាប់ពេលអូសចំណុចកាត់រូប -->
                <div id="loupeContainer" class="hidden absolute pointer-events-none z-50 border-4 border-gray-300 rounded-full overflow-hidden shadow-xl bg-black" style="width: 100px; height: 100px;">
                    <canvas id="loupeCanvas" width="100" height="100"></canvas>
                    <!-- សញ្ញាបូកចំកណ្តាលកែវពង្រីក -->
                    <div class="absolute top-1/2 left-1/2 w-4 h-0.5 bg-green-400 -translate-x-1/2 -translate-y-1/2"></div>
                    <div class="absolute top-1/2 left-1/2 w-0.5 h-4 bg-green-400 -translate-x-1/2 -translate-y-1/2"></div>
                </div>
            </div>
            
            <!-- Tools Menu -->
            <div class="mt-6 grid grid-cols-4 gap-2 w-full text-center text-sm">
                <button id="doCropBtn" class="bg-blue-500 active:bg-blue-600 text-white p-2 rounded-lg shadow"><i class="fa-solid fa-crop-simple block text-lg mb-1"></i> កាត់រូប</button>
                <button id="filterWhiteboardBtn" class="bg-gray-200 active:bg-gray-300 text-gray-800 p-2 rounded-lg shadow"><i class="fa-solid fa-chess-board block text-lg mb-1"></i> ស/ខ្មៅ</button>
                <button id="filterPhotoBtn" class="bg-gray-200 active:bg-gray-300 text-gray-800 p-2 rounded-lg shadow"><i class="fa-solid fa-image block text-lg mb-1"></i> ពណ៌ដើម</button>
                <button id="saveBtn" class="bg-green-500 active:bg-green-600 text-white p-2 rounded-lg shadow"><i class="fa-solid fa-floppy-disk block text-lg mb-1"></i> Save</button>
            </div>
            
            <button id="resetCropBtn" class="mt-4 text-blue-600 underline text-sm hidden font-bold p-2">ត្រឡប់ទៅកាត់ម្ដងទៀត</button>
        </div>
    </div>

    <!-- រូបភាពដើមលាក់ទុក (High Res) -->
    <img id="sourceImage" class="hidden" alt="Source">
    <!-- Canvas លាក់ទុកសម្រាប់ Save ជាកម្រិតច្បាស់ -->
    <canvas id="outputCanvas" class="hidden"></canvas>

    <!-- Load OpenCV.js -->
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady()" type="text/javascript"></script>

    <script>
        // អថេរសម្រាប់គ្រប់គ្រង UI និង Canvas
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        const sourceImage = document.getElementById('sourceImage');
        const outputCanvas = document.getElementById('outputCanvas');
        
        // កែវពង្រីក
        const loupeContainer = document.getElementById('loupeContainer');
        const loupeCanvas = document.getElementById('loupeCanvas');
        const loupeCtx = loupeCanvas.getContext('2d');
        
        // Data Store 
        // ឥឡូវរក្សាទុកជា Object: { original: 'base64', cropped: 'base64', corners: [{x,y}...], filter: 'str' }
        let savedImages = [];
        let cvReady = false;

        // អថេរសម្រាប់គ្រប់គ្រងការអូសកែង (Drag)
        let originalImgWidth = 0;
        let originalImgHeight = 0;
        let scaleRatio = 1; 
        let corners = []; 
        let draggingPoint = null; 
        let isCropped = false;
        let currentFilter = "none";
        let editingIndex = null; // ចំណាំថាកំពុង Edit ទំព័រទីប៉ុន្មាន

        // --- ផ្នែករៀបចំ OpenCV ---
        function onOpenCvReady() {
            cv['onRuntimeInitialized'] = () => {
                cvReady = true;
                document.getElementById('loadingScreen').classList.add('hidden');
                initApp();
            };
        }

        function initApp() {
            // UI Event Listeners
            document.getElementById('menuBtn').addEventListener('click', () => {
                document.getElementById('sidebar').classList.remove('sidebar-closed');
                document.getElementById('sidebar').classList.add('sidebar-open');
                updateSavedList();
            });
            document.getElementById('closeMenuBtn').addEventListener('click', () => {
                document.getElementById('sidebar').classList.add('sidebar-closed');
                document.getElementById('sidebar').classList.remove('sidebar-open');
            });

            // ផ្ទុករូបភាពពីកាមេរ៉ា ឬ File
            document.getElementById('fileInput').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    editingIndex = null; // Reset ពេលយករូបថ្មី
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        sourceImage.onload = () => {
                            setupCanvasWithImage(false); // មិនមែនជាការ Edit ទេ
                        };
                        sourceImage.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });

            loadSavedData();
        }

        // --- ស្វែងរកកែងក្រដាសដោយស្វ័យប្រវត្តិ (Smart AI Edge Detection) ---
        function autoDetectCorners() {
            try {
                let src = cv.imread(sourceImage);
                
                // ១. បង្រួមរូប (Resize) ធ្វើឲ្យ AI ដើរលឿន និងច្បាស់
                let max_dim = 800;
                let ratio = 1.0;
                let resized = new cv.Mat();
                if (src.cols > max_dim || src.rows > max_dim) {
                    ratio = max_dim / Math.max(src.cols, src.rows);
                    cv.resize(src, resized, new cv.Size(0, 0), ratio, ratio, cv.INTER_AREA);
                } else {
                    src.copyTo(resized);
                }

                let gray = new cv.Mat();
                cv.cvtColor(resized, gray, cv.COLOR_RGBA2GRAY, 0);
                
                // ២. បំបាត់ Noise
                cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);

                // ៣. ស្វែងរកគែម
                let edged = new cv.Mat();
                cv.Canny(gray, edged, 75, 200);

                // ៤. ភ្ជាប់គែមដែលដាច់ៗចូលគ្នា (Morphological Closing)
                let kernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(5, 5));
                cv.morphologyEx(edged, edged, cv.MORPH_CLOSE, kernel);

                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(edged, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);

                let cnts = [];
                for (let i = 0; i < contours.size(); ++i) {
                    cnts.push(contours.get(i));
                }
                
                // តម្រៀបរកផ្ទៃដែលធំជាងគេមកមុន
                cnts.sort((a, b) => cv.contourArea(b) - cv.contourArea(a));

                let bestPts = null;
                let imgArea = resized.cols * resized.rows;

                // ៥. ស្វែងរករាងចតុកោណក្នុងចំណោម ៥ ផ្ទៃធំៗ
                for (let i = 0; i < Math.min(cnts.length, 5); i++) {
                    let cnt = cnts[i];
                    let area = cv.contourArea(cnt);
                    
                    if (area < imgArea * 0.05) continue; // បើទំហំតូចពេក (ក្រោម 5%) រំលង

                    let peri = cv.arcLength(cnt, true);
                    let approx = new cv.Mat();
                    cv.approxPolyDP(cnt, approx, 0.02 * peri, true);
                    
                    // បើរកឃើញកែង ៤ សមស្រប
                    if (approx.rows === 4) {
                        bestPts = [];
                        for(let j=0; j<4; j++) {
                            bestPts.push({
                                x: approx.data32S[j*2] / ratio,
                                y: approx.data32S[j*2+1] / ratio
                            });
                        }
                        approx.delete();
                        break;
                    }
                    approx.delete();
                }

                // ៦. AI Fallback: បើក្រដាសកោង រកកែង៤អត់ឃើញ យកប្រអប់ដែលគ្របផ្ទៃធំជាងគេ (MinAreaRect)
                if (!bestPts && cnts.length > 0 && cv.contourArea(cnts[0]) > imgArea * 0.05) {
                    let rect = cv.minAreaRect(cnts[0]);
                    let box = cv.RotatedRect.points(rect);
                    bestPts = [];
                    for(let j=0; j<4; j++) {
                        bestPts.push({
                            x: box[j].x / ratio,
                            y: box[j].y / ratio
                        });
                    }
                }

                // សម្អាត Memory
                src.delete(); resized.delete(); gray.delete(); edged.delete(); kernel.delete(); 
                contours.delete(); hierarchy.delete();
                cnts.forEach(c => c.delete());

                // ៧. រៀបចំចំណុចទាំង៤ ត្រឡប់ទៅឲ្យ Canvas វិញ
                if (bestPts && bestPts.length === 4) {
                    bestPts = bestPts.map(p => ({ 
                        x: Math.max(0, p.x * scaleRatio), 
                        y: Math.max(0, p.y * scaleRatio) 
                    }));
                    
                    // តម្រៀបកែង: លើ-ឆ្វេង, លើ-ស្តាំ, ក្រោម-ស្តាំ, ក្រោម-ឆ្វេង
                    bestPts.sort((a, b) => a.y - b.y); // តម្រៀបតាម Y មុន
                    let top = bestPts.slice(0, 2).sort((a, b) => a.x - b.x); // លើ: ឆ្វេងទៅស្តាំ
                    let bottom = bestPts.slice(2, 4).sort((a, b) => b.x - a.x); // ក្រោម: ស្តាំទៅឆ្វេង
                    
                    return [top[0], top[1], bottom[0], bottom[1]];
                }

                return null;
            } catch (err) {
                console.error("AI Auto-crop error:", err);
                return null;
            }
        }

        // --- ផ្នែករៀបចំ Canvas និង ចំណុចកែង ---
        function setupCanvasWithImage(isEditing = false) {
            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('workspace').classList.remove('hidden');
            document.getElementById('resetCropBtn').classList.add('hidden');
            document.getElementById('doCropBtn').classList.remove('hidden');
            
            if(isEditing) {
                document.getElementById('instructionText').innerText = "ទាញកែងបើចង់កាត់ម្ដងទៀត ឬចុច 'កាត់រូប' ដើម្បីបន្ត";
            } else {
                document.getElementById('instructionText').innerText = "អូសចំណុចក្រហមឲ្យចំកែងឯកសារទាំង៤ រួចចុច 'កាត់រូប'";
            }
            
            isCropped = false;
            currentFilter = "none";
            
            originalImgWidth = sourceImage.width;
            originalImgHeight = sourceImage.height;

            // កំណត់ទំហំ Canvas ឲ្យល្មមនឹងអេក្រង់ទូរស័ព្ទ
            const maxWidth = window.innerWidth - 32; 
            const maxHeight = window.innerHeight * 0.55;
            
            scaleRatio = Math.min(maxWidth / originalImgWidth, maxHeight / originalImgHeight);
            
            canvas.width = originalImgWidth * scaleRatio;
            canvas.height = originalImgHeight * scaleRatio;

            // រៀបចំចំណុចកែង
            if (isEditing && editingIndex !== null && savedImages[editingIndex] && savedImages[editingIndex].corners) {
                // ១. ប្រសិនបើ Edit គឺទាញយកកែងចាស់ដែលយើងធ្លាប់បាន Save មកវិញ
                let savedCorners = savedImages[editingIndex].corners;
                corners = savedCorners.map(c => ({
                    x: c.x * canvas.width,
                    y: c.y * canvas.height
                }));
                currentFilter = savedImages[editingIndex].filter || "none";
            } else {
                // ២. ប្រសិនបើរូបថ្មី សាកល្បង Auto Detect សិន
                let detectedCorners = autoDetectCorners();
                if (detectedCorners) {
                    corners = detectedCorners;
                } else {
                    // ៣. បើរកគែមអត់ឃើញ យកលំនាំដើម (80% នៃរូបភាព)
                    const padX = canvas.width * 0.1;
                    const padY = canvas.height * 0.1;
                    corners = [
                        { x: padX, y: padY }, 
                        { x: canvas.width - padX, y: padY }, 
                        { x: canvas.width - padX, y: canvas.height - padY }, 
                        { x: padX, y: canvas.height - padY } 
                    ];
                }
            }

            drawEditor();
        }

        // គូររូបភាព និងបន្ទាត់កែង
        function drawEditor() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // ប្រសិនបើកាត់រួច បង្ហាញរូបដែលកាត់ແລ້វ
            if (isCropped) {
                ctx.filter = currentFilter;
                ctx.drawImage(outputCanvas, 0, 0, canvas.width, canvas.height);
                ctx.filter = "none";
                return;
            }

            // គូររូបភាពដើម
            ctx.drawImage(sourceImage, 0, 0, canvas.width, canvas.height);

            // គូរផ្ទៃស្រមោលក្រៅតំបន់កាត់ (Overlay)
            ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
            ctx.beginPath();
            ctx.moveTo(0, 0); ctx.lineTo(canvas.width, 0); ctx.lineTo(canvas.width, canvas.height); ctx.lineTo(0, canvas.height); ctx.closePath();
            ctx.moveTo(corners[0].x, corners[0].y);
            ctx.lineTo(corners[3].x, corners[3].y);
            ctx.lineTo(corners[2].x, corners[2].y);
            ctx.lineTo(corners[1].x, corners[1].y);
            ctx.closePath();
            ctx.fill("evenodd");

            // គូរបន្ទាត់តភ្ជាប់កែង
            ctx.strokeStyle = "#3b82f6"; // ពណ៌ខៀវ
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(corners[0].x, corners[0].y);
            for(let i=1; i<4; i++) ctx.lineTo(corners[i].x, corners[i].y);
            ctx.closePath();
            ctx.stroke();

            // គូរចំណុចទាំង៤
            ctx.fillStyle = "#ef4444"; // ពណ៌ក្រហម
            corners.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 12, 0, Math.PI * 2); // ដាក់រង្វង់ធំបន្តិចងាយចុច
                ctx.fill();
                ctx.stroke();
            });
        }

        // មុខងារបង្ហាញកែវពង្រីក (ឆ្លាតវៃ មិនបាំងដៃ)
        function updateLoupe(pos) {
            loupeContainer.classList.remove('hidden');
            
            // កំណត់ទីតាំងកែវពង្រីក ឲ្យងាកចូលក្នុង 
            let lX = pos.x;
            let lY = pos.y - 80; // លំនាំដើមគឺនៅខាងលើដៃ 80px
            
            // បើជិតគែមលើពេក ប្តូរមកខាងក្រោមដៃវិញ
            if (lY < 60) lY = pos.y + 80;
            
            // ការពារកុំឲ្យចេញក្រៅគែមឆ្វេង-ស្តាំ
            if (lX < 60) lX = 60;
            if (lX > canvas.width - 60) lX = canvas.width - 60;
            
            loupeContainer.style.left = lX + 'px';
            loupeContainer.style.top = lY + 'px';
            loupeContainer.style.transform = 'translate(-50%, -50%)';
            
            loupeCtx.clearRect(0, 0, 100, 100);
            // ចម្លងរូបពី Canvas ចំណុចកណ្តាលដៃ ទំហំ 50x50 មកដាក់លើកែវពង្រីក 100x100 (Zoom 2x)
            loupeCtx.drawImage(canvas, pos.x - 25, pos.y - 25, 50, 50, 0, 0, 100, 100);
        }

        // --- ផ្នែកបញ្ជាការអូស (Mouse & Touch Events) ---
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function handleStart(e) {
            if(isCropped) return;
            const pos = getPos(e);
            // ស្វែងរកចំណុចដែលត្រូវនឹងកន្លែងចុច (រង្វង់ 40px ងាយស្រួលចុចលើទូរស័ព្ទ)
            draggingPoint = corners.find(p => Math.hypot(p.x - pos.x, p.y - pos.y) < 40);
            
            if (draggingPoint) {
                e.preventDefault();
                updateLoupe(draggingPoint);
            }
        }

        function handleMove(e) {
            if (!draggingPoint || isCropped) return;
            e.preventDefault();
            const pos = getPos(e);
            // ការពារកុំឲ្យអូសចេញក្រៅ Canvas
            draggingPoint.x = Math.max(0, Math.min(canvas.width, pos.x));
            draggingPoint.y = Math.max(0, Math.min(canvas.height, pos.y));
            
            drawEditor(); // គូររូបធំ
            updateLoupe(draggingPoint); // គូរកែវពង្រីក
        }

        function handleEnd(e) {
            draggingPoint = null;
            loupeContainer.classList.add('hidden'); // លាក់កែវពង្រីក
        }

        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        
        canvas.addEventListener('touchstart', handleStart, {passive: false});
        canvas.addEventListener('touchmove', handleMove, {passive: false});
        window.addEventListener('touchend', handleEnd);

        // --- ផ្នែកអនុវត្ត Perspective Transform (OpenCV) ---
        document.getElementById('doCropBtn').addEventListener('click', () => {
            if(!cvReady) return alert("ប្រព័ន្ធកំពុងរៀបចំ...");
            
            // ១. ទាញយករូបដើម (High Res) ចូលក្នុង OpenCV
            let src = cv.imread(sourceImage);
            
            // ២. បំប្លែងកូអរដោនេពី Canvas តូច ទៅជារូបដើមធំ (High Quality)
            let c = corners.map(p => ({ x: p.x / scaleRatio, y: p.y / scaleRatio }));
            
            // ៣. គណនាប្រវែងនិងទទឹងរបស់ឯកសារថ្មី
            let widthA = Math.hypot(c[1].x - c[0].x, c[1].y - c[0].y);
            let widthB = Math.hypot(c[2].x - c[3].x, c[2].y - c[3].y);
            let maxWidth = Math.max(widthA, widthB);

            let heightA = Math.hypot(c[3].x - c[0].x, c[3].y - c[0].y);
            let heightB = Math.hypot(c[2].x - c[1].x, c[2].y - c[1].y);
            let maxHeight = Math.max(heightA, heightB);

            let srcCoords = [c[0].x, c[0].y, c[1].x, c[1].y, c[2].x, c[2].y, c[3].x, c[3].y];
            let dstCoords = [0, 0, maxWidth, 0, maxWidth, maxHeight, 0, maxHeight];

            let srcMat = cv.matFromArray(4, 1, cv.CV_32FC2, srcCoords);
            let dstMat = cv.matFromArray(4, 1, cv.CV_32FC2, dstCoords);

            let M = cv.getPerspectiveTransform(srcMat, dstMat);
            let dst = new cv.Mat();
            let dsize = new cv.Size(maxWidth, maxHeight);

            cv.warpPerspective(src, dst, M, dsize, cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());
            cv.imshow('outputCanvas', dst);

            src.delete(); dst.delete(); M.delete(); srcMat.delete(); dstMat.delete();

            isCropped = true;
            
            const dispWidth = window.innerWidth - 32;
            const dispHeight = window.innerHeight * 0.55;
            const newScale = Math.min(dispWidth / maxWidth, dispHeight / maxHeight);
            canvas.width = maxWidth * newScale;
            canvas.height = maxHeight * newScale;

            document.getElementById('doCropBtn').classList.add('hidden');
            document.getElementById('resetCropBtn').classList.remove('hidden');
            document.getElementById('instructionText').innerText = "ឯកសារត្រូវបានកាត់រួចរាល់ អ្នកអាចកែពណ៌ស/ខ្មៅបាន។";
            
            drawEditor();
        });

        // ត្រឡប់ទៅកាត់ម្ដងទៀត
        document.getElementById('resetCropBtn').addEventListener('click', () => {
            setupCanvasWithImage(editingIndex !== null); // ហៅរៀបចំសាថ្មី
        });

        // --- ផ្នែក Filters និង Save ---
        document.getElementById('filterWhiteboardBtn').addEventListener('click', () => {
            if(!isCropped) return alert("សូមចុច កាត់រូប ជាមុនសិន!");
            currentFilter = "grayscale(100%) contrast(150%) brightness(110%)";
            drawEditor();
        });

        document.getElementById('filterPhotoBtn').addEventListener('click', () => {
            if(!isCropped) return alert("សូមចុច កាត់រូប ជាមុនសិន!");
            currentFilter = "none";
            drawEditor();
        });

        // មុខងារ Save រូបភាពទុកក្នុង Frontend List ជាគុណភាពខ្ពស់
        document.getElementById('saveBtn').addEventListener('click', async () => {
            if(!isCropped) return alert("សូមកាត់រូបឲ្យហើយសិន មុននឹង Save!");
            
            const tmpCanvas = document.createElement('canvas');
            const tmpCtx = tmpCanvas.getContext('2d');
            tmpCanvas.width = outputCanvas.width;
            tmpCanvas.height = outputCanvas.height;
            tmpCtx.filter = currentFilter;
            tmpCtx.drawImage(outputCanvas, 0, 0);

            // បម្លែងទៅជា JPEG (គុណភាព 95%)
            const finalDataUrl = tmpCanvas.toDataURL('image/jpeg', 0.95);
            
            // រក្សាទីតាំងកែងទុក ដើម្បីពេល Edit អាចទាញកែងបានទៀត (ទាញចេញ/ចូល)
            const relativeCorners = corners.map(c => ({
                x: c.x / canvas.width,
                y: c.y / canvas.height
            }));

            const documentObject = {
                original: sourceImage.src,   // រក្សារូបដើមទាំងស្រុង
                cropped: finalDataUrl,       // រូបដែលកាត់ហើយ
                filter: currentFilter,
                corners: relativeCorners     // ទីតាំងកែងទាំង៤
            };
            
            if (editingIndex !== null) {
                // Update ឯកសារចាស់
                savedImages[editingIndex] = documentObject;
                alert('បានធ្វើបច្ចុប្បន្នភាពទំព័រទី ' + (editingIndex + 1) + ' ដោយជោគជ័យ!');
                editingIndex = null; // Reset
            } else {
                // Save ឯកសារថ្មី
                savedImages.push(documentObject);
                alert('បានរក្សាទុកទំព័រទី ' + savedImages.length + ' ចូលក្នុងទូរស័ព្ទ និងបញ្ជីដោយជោគជ័យ!');
            }
            
            await localforage.setItem('scannedDocs', savedImages);
            updateSavedList();
            
            // --- Save ចូល Device (Gallery/Photos) ---
            const link = document.createElement('a');
            link.href = finalDataUrl;
            link.download = `DocScanner_Page_${Date.now()}.jpg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            // លាក់ Workspace
            document.getElementById('workspace').classList.add('hidden');
            document.getElementById('placeholder').classList.remove('hidden');
            document.getElementById('fileInput').value = ""; // Reset Input
        });

        // បង្ហាញបញ្ជីរូបភាពក្នុង Sidebar
        function updateSavedList() {
            const listDiv = document.getElementById('savedList');
            listDiv.innerHTML = '';
            if(savedImages.length === 0) {
                listDiv.innerHTML = '<p class="text-gray-500 text-center mt-10">មិនទាន់មានឯកសារទេ</p>';
                return;
            }
            savedImages.forEach((item, index) => {
                // ការពារទិន្នន័យចាស់ (ជំនាន់មុន) ដែលគ្មាន Object
                let imgSrc = typeof item === 'string' ? item : item.cropped;
                
                listDiv.innerHTML += `
                    <div class="mb-3 p-2 border rounded shadow-sm flex justify-between items-center bg-gray-50 cursor-pointer hover:bg-blue-100 transition-colors" onclick="editImage(${index})">
                        <img src="${imgSrc}" class="w-16 h-16 object-cover rounded border">
                        <span class="text-sm font-bold text-gray-700 flex-1 ml-3">ទំព័រ ${index + 1}</span>
                        <button onclick="event.stopPropagation(); deleteImage(${index})" class="text-red-500 p-2 hover:bg-red-200 rounded transition-colors"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
            });
        }

        // មុខងារបើកមើល និង Edit រូបភាព
        window.editImage = function(index) {
            let item = savedImages[index];
            if (typeof item === 'string') {
                alert("ទម្រង់ឯកសារជំនាន់ចាស់ មិនអាច Edit បានទេ សូមកាត់ថ្មី។");
                return;
            }

            editingIndex = index;
            
            // បិទ Sidebar
            document.getElementById('sidebar').classList.add('sidebar-closed');
            document.getElementById('sidebar').classList.remove('sidebar-open');
            
            // ដាក់រូបដើម (Original) ចូលទៅក្នុងផ្ទាំង Edit វិញ
            sourceImage.onload = () => {
                setupCanvasWithImage(true);
            };
            sourceImage.src = item.original;
        };

        // លុបរូបភាព
        window.deleteImage = async function(index) {
            if(confirm("តើអ្នកពិតជាចង់លុបទំព័រនេះមែនទេ?")) {
                savedImages.splice(index, 1);
                await localforage.setItem('scannedDocs', savedImages);
                updateSavedList();
            }
        };

        // ទាញទិន្នន័យចាស់មកវិញ
        async function loadSavedData() {
            const storedDocs = await localforage.getItem('scannedDocs');
            if (storedDocs) {
                savedImages = storedDocs;
            }
        }

        // មុខងារ Export ជា PDF
        document.getElementById('exportPdfBtn').addEventListener('click', () => {
            if (savedImages.length === 0) {
                alert("សូម Save ឯកសារយ៉ាងហោចណាស់ ១ សិន!");
                return;
            }
            
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');

            savedImages.forEach((item, index) => {
                if (index > 0) pdf.addPage();
                
                let imgData = typeof item === 'string' ? item : item.cropped;
                
                const imgProps = pdf.getImageProperties(imgData);
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                
                const finalHeight = pdfHeight > pdf.internal.pageSize.getHeight() ? pdf.internal.pageSize.getHeight() : pdfHeight;
                const finalWidth = pdfHeight > pdf.internal.pageSize.getHeight() ? (imgProps.width * finalHeight) / imgProps.height : pdfWidth;
                
                const xOffset = (pdf.internal.pageSize.getWidth() - finalWidth) / 2;
                const yOffset = (pdf.internal.pageSize.getHeight() - finalHeight) / 2;

                pdf.addImage(imgData, 'JPEG', xOffset, yOffset, finalWidth, finalHeight);
            });

            pdf.save(`Scanned_Doc_${Date.now()}.pdf`);
        });

    </script>
</body>
