<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="https://img.freepik.com/premium-vector/scan-documents-icon_268104-3391.jpg?w=360">

<link rel="apple-touch-icon" href="https://img.freepik.com/premium-vector/scan-documents-icon_268104-3391.jpg?w=360">

<link rel="manifest" href="manifest.json">

<meta property="og:title" content="Document Scanner App">
<meta property="og:description" content="កម្មវិធី Scan ឯកសារ កាត់ត និងបំប្លែងទៅជា PDF ដោយងាយស្រួល។">
<meta property="og:image" content="https://img.freepik.com/premium-vector/scan-documents-icon_268104-3391.jpg?w=360">
<meta property="og:url" content="https://your-website-url.com"> <meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Document Scanner App">
<meta name="twitter:description" content="កម្មវិធី Scan ឯកសារ កាត់ត និងបំប្លែងទៅជា PDF ដោយងាយស្រួល។">
<meta name="twitter:image" content="https://img.freepik.com/premium-vector/scan-documents-icon_268104-3391.jpg?w=360">
  
    <title>Document Scanner App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  
    
    <style>
        /* CSS សម្រាប់ Sidebar Menu */
        #sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-open { transform: translateX(0); }
        .sidebar-closed { transform: translateX(-100%); }
        .image-container { max-height: 60vh; overflow: hidden; }
        img { display: block; max-width: 100%; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <div class="bg-blue-600 text-white p-4 flex justify-between items-center shadow-md">
        <button id="menuBtn" class="text-2xl focus:outline-none">
            <i class="fa-solid fa-bars"></i>
        </button>
        <h1 class="text-xl font-bold">DocScanner</h1>
        <label class="cursor-pointer">
            <i class="fa-solid fa-camera text-2xl"></i>
            <input type="file" id="fileInput" accept="image/*" capture="environment" class="hidden">
        </label>
    </div>

    <div id="sidebar" class="sidebar-closed fixed top-0 left-0 h-full w-64 bg-white shadow-xl z-50 flex flex-col">
        <div class="bg-blue-600 text-white p-4 text-lg font-bold flex justify-between items-center">
            <span>ឯកសារដែលបាន Save</span>
            <button id="closeMenuBtn"><i class="fa-solid fa-times"></i></button>
        </div>
        <div class="p-4 flex-1 overflow-y-auto" id="savedList">
            </div>
        <div class="p-4 border-t">
            <button id="exportPdfBtn" class="w-full bg-red-500 text-white py-2 rounded shadow flex justify-center items-center gap-2">
                <i class="fa-solid fa-file-pdf"></i> Export ជា PDF
            </button>
        </div>
    </div>

    <div class="flex-1 p-4 flex flex-col items-center justify-center">
        <div id="workspace" class="hidden w-full max-w-md bg-white p-2 shadow-lg rounded">
            <div class="image-container">
                <img id="imagePreview" src="" alt="Preview">
            </div>
            
            <div class="mt-4 grid grid-cols-4 gap-2 text-center text-sm">
                <button id="cropBtn" class="bg-gray-200 p-2 rounded"><i class="fa-solid fa-crop-simple block text-lg"></i> Crop</button>
                <button id="filterWhiteboardBtn" class="bg-gray-200 p-2 rounded"><i class="fa-solid fa-chess-board block text-lg"></i> Whiteboard</button>
                <button id="filterPhotoBtn" class="bg-gray-200 p-2 rounded"><i class="fa-solid fa-image block text-lg"></i> Photo</button>
                <button id="saveBtn" class="bg-green-500 text-white p-2 rounded"><i class="fa-solid fa-floppy-disk block text-lg"></i> Save</button>
            </div>
            
            <div class="mt-4">
                <label class="block text-xs text-gray-500">Brightness</label>
                <input type="range" id="brightness" min="50" max="150" value="100" class="w-full">
            </div>
        </div>
        <div id="placeholder" class="text-gray-400 flex flex-col items-center">
            <i class="fa-solid fa-file-signature text-6xl mb-2"></i>
            <p>សូមថត ឬជ្រើសរើសរូបភាពដើម្បីចាប់ផ្ដើម</p>
        </div>
    </div>

    <canvas id="filterCanvas" class="hidden"></canvas>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const closeMenuBtn = document.getElementById('closeMenuBtn');
        const sidebar = document.getElementById('sidebar');
        const fileInput = document.getElementById('fileInput');
        const imagePreview = document.getElementById('imagePreview');
        const workspace = document.getElementById('workspace');
        const placeholder = document.getElementById('placeholder');
        const brightnessInput = document.getElementById('brightness');
        
        let cropper;
        let savedImages = []; // ផ្ទុកទិន្នន័យ Base64

        // មុខងារបើក/បិទ Sidebar
        menuBtn.addEventListener('click', () => {
            sidebar.classList.remove('sidebar-closed');
            sidebar.classList.add('sidebar-open');
        });
        closeMenuBtn.addEventListener('click', () => {
            sidebar.classList.remove('sidebar-open');
            sidebar.classList.add('sidebar-closed');
        });

        // ពេលបញ្ចូលរូបភាព
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    imagePreview.src = event.target.result;
                    workspace.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    
                    // Reset Cropper បើមាន
                    if(cropper) cropper.destroy();
                    imagePreview.style.filter = "brightness(100%) contrast(100%) grayscale(0%)";
                    brightnessInput.value = 100;
                };
                reader.readAsDataURL(file);
            }
        });

        // មុខងារ Crop (Manual Crop / Auto-ratio)
        document.getElementById('cropBtn').addEventListener('click', () => {
            if (cropper) {
                // ទទួលបានរូបដែល Crop រួច
                const croppedCanvas = cropper.getCroppedCanvas();
                imagePreview.src = croppedCanvas.toDataURL();
                cropper.destroy();
                cropper = null;
            } else {
                // បើកមុខងារ Crop
                cropper = new Cropper(imagePreview, {
                    viewMode: 1,
                    autoCropArea: 0.8,
                });
            }
        });

        // មុខងារ Filter (Whiteboard / Document)
        document.getElementById('filterWhiteboardBtn').addEventListener('click', () => {
            // បង្កើនពន្លឺ និង Contrast កាត់បន្ថយពណ៌
            imagePreview.style.filter = "brightness(110%) contrast(150%) grayscale(100%)";
        });

        // មុខងារ Filter (Photo)
        document.getElementById('filterPhotoBtn').addEventListener('click', () => {
            imagePreview.style.filter = "brightness(100%) contrast(110%) saturate(120%)";
        });

        // មុខងារកែពន្លឺ Manual
        brightnessInput.addEventListener('input', (e) => {
            imagePreview.style.filter = `brightness(${e.target.value}%)`;
        });

        // មុខងារ Save រូបភាពទុកក្នុង Frontend List (IndexedDB)
        document.getElementById('saveBtn').addEventListener('click', async () => {
            // Apply filter ចូលក្នុង Canvas ដើម្បីទាញយករូបពិត
            const canvas = document.getElementById('filterCanvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            img.src = imagePreview.src;
            
            img.onload = async () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.filter = imagePreview.style.filter !== "" ? imagePreview.style.filter : "none";
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                const finalDataUrl = canvas.toDataURL('image/jpeg', 0.8); // Save ជា JPEG ដើម្បីបន្ថយទំហំ
                
                savedImages.push(finalDataUrl);
                // Save ចូល LocalForage ដើម្បីកុំឲ្យពេញ Storage ពេលមាន ១០០សន្លឹក
                await localforage.setItem('scannedDocs', savedImages);
                updateSavedList();
                alert('បានរក្សាទុកដោយជោគជ័យ!');
            };
        });

        // បង្ហាញបញ្ជីរូបភាពក្នុង Sidebar
        function updateSavedList() {
            const listDiv = document.getElementById('savedList');
            listDiv.innerHTML = '';
            savedImages.forEach((imgSrc, index) => {
                listDiv.innerHTML += `
                    <div class="mb-2 p-2 border rounded flex justify-between items-center bg-gray-50">
                        <img src="${imgSrc}" class="w-16 h-16 object-cover rounded">
                        <span class="text-sm font-bold">ទំព័រ ${index + 1}</span>
                    </div>
                `;
            });
        }

        // មុខងារ Export ជា PDF (បញ្ចូល ១០០សន្លឹក+)
        document.getElementById('exportPdfBtn').addEventListener('click', () => {
            if (savedImages.length === 0) {
                alert("សូម Save ឯកសារយ៉ាងហោចណាស់ ១ សិន!");
                return;
            }
            
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4'); // ទំហំ A4

            savedImages.forEach((imgData, index) => {
                if (index > 0) pdf.addPage();
                
                // រៀបចំរូបឲ្យត្រូវនឹងទំហំ A4 (210 x 297 mm)
                const imgProps = pdf.getImageProperties(imgData);
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                
                pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
            });

            pdf.save('Scanned_Document.pdf');
        });

        // ទាញទិន្នន័យចាស់មកវិញពេលបើក App ម្ដងទៀត
        window.onload = async () => {
            const storedDocs = await localforage.getItem('scannedDocs');
            if (storedDocs) {
                savedImages = storedDocs;
                updateSavedList();
            }
        };
    </script>
</body>
</html>
